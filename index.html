<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samir Ingle</title>
  <meta name="description" content="Samir Ingle — Software Engineer. Type 'help' to get started.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #0b0b0a;
      color: #f5f5f4;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.75;
      overflow: hidden;
    }

    #terminal {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem 1rem;
      overflow: hidden;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #output::-webkit-scrollbar { display: none; }

    /* output text colours */
    .c-dim   { color: #333; }
    .c-muted { color: #555; }
    .c-mid   { color: #888; }
    .c-bright{ color: #f5f5f4; }
    .c-green { color: #7ecba0; }
    .c-red   { color: #c46b6b; }
    .c-blue  { color: #6ba3c4; }

    .out-block { margin-bottom: 0.1rem; }
    .out-block p { white-space: pre-wrap; }

    /* links inside output */
    .out-block a {
      color: #6ba3c4;
      text-decoration: none;
      transition: color 0.15s;
    }
    .out-block a:hover { color: #f5f5f4; }

    /* the echoed command line */
    .echo-line {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.1rem;
      white-space: pre;
    }
    .echo-line .ps  { color: #555; }
    .echo-line .cmd { color: #f5f5f4; }

    /* input row */
    #input-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      padding-top: 0.1rem;
      flex-shrink: 0;
    }

    #prompt-label { color: #555; white-space: pre; }
    #prompt-label .u { color: #7ecba0; }

    #display {
      color: #f5f5f4;
      white-space: pre;
      flex: 1;
    }

    .cursor-block {
      display: inline-block;
      width: 7px; height: 0.85em;
      background: #f5f5f4;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* hidden real input */
    #real-input {
      position: fixed; opacity: 0;
      top: 0; left: 0; width: 1px; height: 1px;
    }

    /* man page style */
    .man { color: #888; }
    .man .bold { color: #f5f5f4; font-weight: 500; }

    /* git log */
    .git-hash  { color: #c4a86b; }
    .git-author{ color: #7ecba0; }
    .git-date  { color: #555; }
    .git-msg   { color: #f5f5f4; }

    /* neofetch */
    .neo { display: flex; gap: 2rem; }
    .neo-art { color: #7ecba0; white-space: pre; line-height: 1.4; }
    .neo-info { white-space: pre; }
    .neo-info .key { color: #7ecba0; }
    .neo-info .val { color: #888; }

    /* ls */
    .ls-grid {
      display: flex; gap: 2rem; flex-wrap: wrap;
    }
    .ls-file { color: #f5f5f4; }
    .ls-dir  { color: #6ba3c4; font-weight: 500; }

    /* ping */
    .ping-line { color: #888; }
    .ping-stat { color: #7ecba0; }
  </style>
</head>
<body>

<div id="terminal">
  <div id="output"></div>
  <div id="input-row">
    <span id="prompt-label"><span class="u">samir</span>@samiringle.com:~$</span>
    <span id="display"></span><span class="cursor-block"></span>
  </div>
</div>
<input id="real-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

<script>
(() => {
  const output   = document.getElementById('output');
  const display  = document.getElementById('display');
  const realInput= document.getElementById('real-input');

  let history    = [];
  let histIdx    = -1;
  let typed      = '';
  let vimMode    = false;

  // ── Focus ────────────────────────────────────────────
  function focusInput() { realInput.focus(); }
  document.addEventListener('click', e => {
    const link = e.target.closest('a');
    if (link) {
      const href = link.getAttribute('href');
      if (href && !href.startsWith('mailto:') && !href.startsWith('#')) {
        e.preventDefault();
        window.open(href, '_blank', 'noopener,noreferrer');
      }
    } else {
      focusInput();
    }
  });
  focusInput();

  function fallbackCopy(text, cb) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) {}
    document.body.removeChild(ta);
  }

  // ── Render ───────────────────────────────────────────
  function updateDisplay() { display.textContent = typed; }

  function appendEcho(cmd) {
    const row = document.createElement('div');
    row.className = 'echo-line';
    row.innerHTML = `<span class="ps">samir@samiringle.com:~$</span><span class="cmd">${esc(cmd)}</span>`;
    output.appendChild(row);
  }

  function appendOut(html, extraClass = '') {
    const block = document.createElement('div');
    block.className = 'out-block' + (extraClass ? ' ' + extraClass : '');
    block.innerHTML = html;
    output.appendChild(block);
  }

  function appendBlank() {
    output.appendChild(document.createElement('br'));
  }

  function scrollBottom() {
    output.scrollTop = output.scrollHeight;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Welcome ──────────────────────────────────────────
  appendOut(`<p class="c-dim">Last login: ${new Date().toDateString()} on ttys001</p>`);
  appendOut(`<p class="c-muted">samiringle.com — bash — 80×24</p>`);
  appendBlank();
  appendOut(`<p class="c-mid">Type <span class="c-bright">help</span> to see what's here.</p>`);
  appendBlank();

  // ── Commands ─────────────────────────────────────────
  function runCommand(raw) {
    const cmd = raw.trim();
    const lower = cmd.toLowerCase();
    const argv  = cmd.split(/\s+/);
    const base  = argv[0].toLowerCase();

    if (!cmd) return;

    appendEcho(cmd);
    appendBlank();

    // vim escape joke
    if (vimMode) {
      if (cmd === ':q!' || cmd === ':q' || cmd === ':wq' || cmd === ':wq!') {
        appendOut(`<p class="c-muted">Good. You know how to exit vim. You may proceed.</p>`);
        vimMode = false;
      } else {
        appendOut(`<p class="c-dim">-- INSERT --</p>`);
        appendOut(`<p class="c-red">E447: Can't find file "${esc(cmd)}" in path — just kidding, you're in vim. Type :q! to escape.</p>`);
      }
      appendBlank();
      scrollBottom();
      return;
    }

    // ── command map ───────────────────────────────────
    if (base === 'clear') {
      output.innerHTML = '';
      return;
    }

    else if (base === 'help') {
      appendOut(`<p class="c-bright">available commands</p>`);
      appendOut(`<p class="c-dim">──────────────────────────────</p>`);
      const cmds = [
        ['whoami',           'who is this person'],
        ['ls',               'see what\'s here'],
        ['cat <file>',       'read a file'],
        ['git log',          'commit history'],
        ['man samir',        'the manual page'],
        ['neofetch',         'system info'],
        ['ping samiringle.com', 'check if i\'m alive'],
        ['history',          'what you\'ve typed'],
        ['clear',            'clean slate'],
      ];
      cmds.forEach(([c, d]) => {
        appendOut(`<p><span class="c-bright" style="display:inline-block;min-width:22ch">${esc(c)}</span><span class="c-muted">${d}</span></p>`);
      });
      appendOut(`<p class="c-dim" style="margin-top:0.5rem">there may be other commands worth trying.</p>`);
    }

    else if (base === 'whoami') {
      appendOut(`<p class="c-bright">Samir Ingle</p>`);
    }

    else if (base === 'ls') {
      if (argv[1] === '-la' || argv[1] === '-al' || argv[1] === '-l') {
        appendOut(`<p class="c-muted">total 5</p>`);
        const files = [
          ['drwxr-xr-x', 'samir', 'staff', '128', 'Jun 14', '.'],
          ['drwxr-xr-x', 'samir', 'staff', '128', 'Jun 14', '..'],
          ['-rw-r--r--', 'samir', 'staff', '512', 'Jun 14', 'about.txt'],
          ['-rw-r--r--', 'samir', 'staff', '384', 'Jun 14', 'experience.txt'],
          ['-rw-r--r--', 'samir', 'staff', '192', 'Jun 14', 'contact.txt'],
          ['-rw-r--r--', 'samir', 'staff', '256', 'Jun 14', 'skills.txt'],
        ];
        files.forEach(([perms, u, g, size, date, name]) => {
          const nameColor = name.startsWith('.') ? 'c-dim' : 'c-bright';
          appendOut(`<p><span class="c-muted">${perms}  ${u}  ${g}  ${size.padStart(4)}  ${date}  </span><span class="${nameColor}">${name}</span></p>`);
        });
      } else {
        appendOut(`<div class="ls-grid">
          <span class="ls-file">about.txt</span>
          <span class="ls-file">contact.txt</span>
          <span class="ls-file">experience.txt</span>
          <span class="ls-file">skills.txt</span>
        </div>`);
      }
    }

    else if (base === 'cat') {
      const file = argv[1];
      if (!file) {
        appendOut(`<p class="c-red">cat: missing operand</p>`);
      } else if (file === 'about.txt') {
        appendOut(`<p><span class="c-muted" style="display:inline-block;min-width:12ch">name</span><span class="c-bright">Samir Ingle</span></p>`);
        appendOut(`<p><span class="c-muted" style="display:inline-block;min-width:12ch">role</span><span class="c-bright">Software Engineer</span></p>`);
        appendOut(`<p><span class="c-muted" style="display:inline-block;min-width:12ch">location</span><span class="c-bright">San Francisco, CA</span></p>`);
        appendBlank();
        appendOut(`<p class="c-mid">Previously an engineer at AWS where I worked on</p>`);
        appendOut(`<p class="c-mid">S3's routing infrastructure. Now exploring</p>`);
        appendOut(`<p class="c-mid">what's next.</p>`);
      } else if (file === 'experience.txt') {
        appendOut(`<p class="c-bright">Amazon Web Services (AWS)</p>`);
        appendOut(`<p class="c-muted">Software Engineer</p>`);
        appendBlank();
        appendOut(`<p class="c-mid">  └─ S3 Routing API team</p>`);
        appendOut(`<p class="c-mid">  └─ Handled all traffic to and from S3</p>`);
        appendOut(`<p class="c-mid">  └─ One of the highest-throughput services on earth</p>`);
        appendBlank();
        appendOut(`<p class="c-dim">  status: alumni</p>`);
      } else if (file === 'contact.txt') {
        const links = [
          ['github', 'github.com/SamirIngley',   'https://github.com/SamirIngley'],
          ['twitter','twitter.com/samir_ingle',  'https://twitter.com/samir_ingle'],
          ['medium', 'samiringle.medium.com',    'https://samiringle.medium.com'],
          ['email',  'samir.ingle7@gmail.com',   'mailto:samir.ingle7@gmail.com'],
        ];
        links.forEach(([label, display, url]) => {
          if (url.startsWith('mailto:')) {
            const email = display;
            const p = document.createElement('p');
            p.innerHTML = `<span class="c-muted" style="display:inline-block;min-width:10ch">${label}</span><span class="c-mid">→  </span><a class="email-copy" style="cursor:pointer" data-email="${email}">${email}</a>`;
            const block = document.createElement('div');
            block.className = 'out-block';
            block.appendChild(p);
            output.appendChild(block);
            block.querySelector('.email-copy').addEventListener('click', e => {
              e.preventDefault();
              const a = e.target;
              function showCopied() {
                const orig = a.textContent;
                a.textContent = 'copied!';
                a.style.color = '#7ecba0';
                setTimeout(() => { a.textContent = orig; a.style.color = ''; }, 1800);
              }
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(email).then(showCopied).catch(() => fallbackCopy(email, showCopied));
              } else {
                fallbackCopy(email, showCopied);
              }
            });
          } else {
            appendOut(`<p><span class="c-muted" style="display:inline-block;min-width:10ch">${label}</span><span class="c-mid">→  </span><a href="${url}" target="_blank" rel="noopener noreferrer" onclick="var w=window.open(this.href,'_blank','noopener,noreferrer');if(!w)location.href=this.href;return false;">${display}</a></p>`);
          }
        });
      } else if (file === 'skills.txt') {
        appendOut(`<p><span class="c-muted" style="display:inline-block;min-width:16ch">languages</span><span class="c-mid">Go, Python, Java</span></p>`);
        appendOut(`<p><span class="c-muted" style="display:inline-block;min-width:16ch">infra</span><span class="c-mid">AWS, distributed systems, networking</span></p>`);
        appendOut(`<p><span class="c-muted" style="display:inline-block;min-width:16ch">interests</span><span class="c-mid">building things, breaking things</span></p>`);
      } else {
        appendOut(`<p class="c-red">cat: ${esc(file)}: No such file or directory</p>`);
      }
    }

    else if (lower === 'pwd') {
      appendOut(`<p class="c-mid">/home/samir</p>`);
    }

    else if (lower === 'date') {
      appendOut(`<p class="c-mid">${new Date().toString()}</p>`);
    }

    else if (base === 'echo') {
      const msg = argv.slice(1).join(' ');
      appendOut(`<p class="c-mid">${esc(msg) || ''}</p>`);
    }

    else if (lower === 'history') {
      if (history.length === 0) {
        appendOut(`<p class="c-muted">no history yet.</p>`);
      } else {
        history.forEach((h, i) => {
          appendOut(`<p><span class="c-dim" style="display:inline-block;min-width:4ch">${i + 1}</span><span class="c-mid">${esc(h)}</span></p>`);
        });
      }
    }

    else if (lower === 'git log' || lower === 'git log --oneline') {
      const commits = [
        { hash: 'a3f92c1', msg: 'exploring what\'s next',           date: 'now',        },
        { hash: '7b18e4d', msg: 'routed a lot of traffic through s3', date: '2019–2024' },
        { hash: '2c4891a', msg: 'joined aws, routing team',           date: 'a while ago'},
        { hash: '9d1f83b', msg: 'initial commit',                     date: 'the start'  },
      ];
      commits.forEach(c => {
        appendOut(`<p><span class="git-hash">commit ${c.hash}</span></p>`);
        appendOut(`<p class="git-date">Date:   ${c.date}</p>`);
        appendBlank();
        appendOut(`<p class="git-msg">    ${esc(c.msg)}</p>`);
        appendBlank();
      });
    }

    else if (lower.startsWith('git')) {
      appendOut(`<p class="c-muted">git: '${esc(argv[1] || '')}' is not a git command. Try <span class="c-bright">git log</span>.</p>`);
    }

    else if (lower === 'man samir' || lower === 'man samiringle') {
      appendOut(`<div class="man">
<p><span class="bold">SAMIR(1)</span>                  User Commands                  <span class="bold">SAMIR(1)</span></p>
<br>
<p><span class="bold">NAME</span></p>
<p>       samir – software engineer</p>
<br>
<p><span class="bold">SYNOPSIS</span></p>
<p>       samir [--build] [--ship] [--explore]</p>
<br>
<p><span class="bold">DESCRIPTION</span></p>
<p>       Samir Ingle is a software engineer based in San Francisco.</p>
<p>       Previously worked on S3's routing infrastructure at AWS.</p>
<p>       Currently in --explore mode.</p>
<br>
<p><span class="bold">OPTIONS</span></p>
<p>       --build     builds things that scale</p>
<p>       --ship      ships fast</p>
<p>       --explore   currently active</p>
<br>
<p><span class="bold">SEE ALSO</span></p>
<p>       <a href="https://github.com/SamirIngley" target="_blank" rel="noopener" onclick="var w=window.open(this.href,'_blank','noopener,noreferrer');if(!w)location.href=this.href;return false;">github(1)</a>, <a href="https://twitter.com/samir_ingle" target="_blank" rel="noopener" onclick="var w=window.open(this.href,'_blank','noopener,noreferrer');if(!w)location.href=this.href;return false;">twitter(1)</a>, <a href="https://samiringle.medium.com" target="_blank" rel="noopener" onclick="var w=window.open(this.href,'_blank','noopener,noreferrer');if(!w)location.href=this.href;return false;">medium(1)</a></p>
<br>
<p><span class="bold">BUGS</span></p>
<p>       None known. Probably.</p>
<br>
<p>samiringle.com            June 2026             <span class="bold">SAMIR(1)</span></p>
</div>`);
    }

    else if (lower === 'man') {
      appendOut(`<p class="c-red">What manual page do you want?</p>`);
      appendOut(`<p class="c-muted">Try: <span class="c-bright">man samir</span></p>`);
    }

    else if (lower === 'neofetch') {
      appendOut(`<div class="neo">
  <pre class="neo-art">        ██████
      ██      ██
     █  ██████  █
     █  █    █  █
      ██  ██  ██
        ██████
          ██
        ████</pre>
  <div class="neo-info">
<p><span class="c-green">samir</span><span class="c-muted">@</span><span class="c-green">samiringle.com</span></p>
<p class="c-dim">─────────────────────────</p>
<p><span class="key c-green">OS        </span><span class="val">macOS Sequoia</span></p>
<p><span class="key c-green">Shell     </span><span class="val">zsh</span></p>
<p><span class="key c-green">Location  </span><span class="val">San Francisco, CA</span></p>
<p><span class="key c-green">Role      </span><span class="val">Software Engineer</span></p>
<p><span class="key c-green">Former    </span><span class="val">AWS S3, Routing API</span></p>
<p><span class="key c-green">Status    </span><span class="val">exploring</span></p>
<p><span class="key c-green">Uptime    </span><span class="val">${Math.floor((Date.now() / 1000 / 60 / 60 / 24 / 365))} years</span></p>
  </div>
</div>`);
    }

    else if (lower === 'ping samiringle.com' || lower === 'ping samiringle.com -c 4') {
      appendOut(`<p class="ping-line">PING samiringle.com: 56 data bytes</p>`);
      [12, 11, 13, 12].forEach((ms, i) => {
        appendOut(`<p class="ping-line">64 bytes from samiringle.com: icmp_seq=${i} ttl=64 time=${ms} ms</p>`);
      });
      appendBlank();
      appendOut(`<p class="ping-stat">--- samiringle.com ping statistics ---</p>`);
      appendOut(`<p class="ping-stat">4 packets transmitted, 4 received, 0% packet loss</p>`);
      appendOut(`<p class="ping-stat">round-trip min/avg/max = 11/12/13 ms</p>`);
      appendOut(`<p class="c-dim" style="margin-top:0.3rem">yep, still alive.</p>`);
    }

    else if (lower.startsWith('ping')) {
      appendOut(`<p class="c-red">ping: cannot resolve ${esc(argv[1] || '')}: try samiringle.com</p>`);
    }

    else if (lower === 'curl samiringle.com' || lower === 'curl -s samiringle.com') {
      appendOut(`<p class="c-muted">you're already here.</p>`);
    }

    else if (lower === 'vim' || lower === 'vi' || lower === 'nano' || lower === 'emacs') {
      vimMode = (base === 'vim' || base === 'vi');
      if (vimMode) {
        appendOut(`<p class="c-dim">                                        VIM - Vi IMproved</p>`);
        appendOut(`<p class="c-dim">                                        version 9.0.0000</p>`);
        appendBlank();
        appendOut(`<p class="c-dim">                                   Type  :q!  and Enter to exit.</p>`);
        appendBlank();
        appendOut(`<p class="c-dim">~</p><p class="c-dim">~</p><p class="c-dim">~</p>`);
      } else {
        appendOut(`<p class="c-muted">error: you opened ${base} and now you can't close it.</p>`);
        appendOut(`<p class="c-dim">just kidding. (but also: use vim.)</p>`);
      }
    }

    else if (lower === 'exit' || lower === 'logout' || lower === 'quit') {
      appendOut(`<p class="c-muted">logout: there's nowhere to go. you're already here.</p>`);
    }

    else if (lower.startsWith('sudo')) {
      appendOut(`<p class="c-red">samir is not in the sudoers file. This incident will be reported.</p>`);
    }

    else if (lower.startsWith('rm')) {
      appendOut(`<p class="c-red">Permission denied. Nice try.</p>`);
    }

    else if (lower === 'jobs') {
      appendOut(`<p class="c-muted">[1]  exploring         (active)</p>`);
      appendOut(`<p class="c-dim">[?]  open to ideas      (considering)</p>`);
    }

    else if (lower.startsWith('find') && lower.includes('.job')) {
      appendOut(`<p class="c-muted">find: no jobs found. check back soon.</p>`);
    }

    else if (lower === 'uname' || lower === 'uname -a') {
      appendOut(`<p class="c-mid">samir-os 1.0.0 ${new Date().getFullYear()} x86_64 JetBrains-Mono-Edition</p>`);
    }

    else if (lower === 'uptime') {
      appendOut(`<p class="c-mid">up too long. no downtime in years. no complaints.</p>`);
    }

    else if (lower === 'coffee' || lower === 'brew install coffee') {
      appendOut(`<p class="c-muted">🚫  brew: coffee: not found</p>`);
      appendOut(`<p class="c-dim">have you tried just making one?</p>`);
    }

    else if (lower === 'hello' || lower === 'hi' || lower === 'hey') {
      appendOut(`<p class="c-mid">hi! type <span class="c-bright">help</span> to get started.</p>`);
    }

    else if (lower === 'ls -la' || lower === 'ls -al') {
      // already handled above but just in case
      appendOut(`<p class="c-red">cat: missing operand</p>`);
    }

    else if (lower === 'traceroute samiringle.com' || lower === 'traceroute samiringle.com -m 6') {
      const hops = [
        [' 2ms', 'gateway.home'],
        [' 7ms', 'isp-edge.us-west'],
        ['14ms', 'aws-backbone.amazon.com'],
        ['19ms', 's3-routing.us-west-2.internal'],
        ['23ms', 'sf.california.us'],
        ['24ms', 'samiringle.com'],
      ];
      appendOut(`<p class="c-muted">traceroute to samiringle.com, 30 hops max</p>`);
      appendBlank();
      hops.forEach(([ms, host], i) => {
        const isFinal = i === hops.length - 1;
        appendOut(`<p><span class="c-dim">${String(i+1).padStart(2)}</span>  <span class="c-muted">${ms}</span>  <span class="${isFinal ? 'c-bright' : 'c-mid'}">${host}</span>${i === 3 ? '<span class="c-dim">   ← former resident</span>' : ''}</p>`);
      });
    }

    else if (lower.startsWith('ssh')) {
      appendOut(`<p class="c-muted">ssh: connect to host ${esc(argv[1] || 'unknown')}: Connection refused</p>`);
      appendOut(`<p class="c-dim">you're already in the right place.</p>`);
    }

    else if (lower === 'python' || lower === 'python3' || lower === 'node' || lower === 'go') {
      appendOut(`<p class="c-muted">>>> I know how to use this. See <span class="c-bright">cat skills.txt</span>.</p>`);
    }

    else if (lower === 'open .' || lower === 'open') {
      appendOut(`<p class="c-muted">you're already looking at it.</p>`);
    }

    else if (lower === 'touch' || base === 'touch') {
      appendOut(`<p class="c-muted">${esc(argv[1] ? argv[1] + ' created.' : 'touch: missing file operand')}</p>`);
    }

    else if (lower === 'ls -lah' || lower === 'ls -lh') {
      appendOut(`<p class="c-muted">same files. just with human-readable sizes. you know what you're doing.</p>`);
    }

    else if (lower === 'cd ..' || lower === 'cd /') {
      appendOut(`<p class="c-muted">there's nothing up there. you're in /home/samir.</p>`);
    }

    else if (lower.startsWith('cd')) {
      appendOut(`<p class="c-red">cd: ${esc(argv[1] || '~')}: No such directory</p>`);
    }

    else if (lower === 'ps' || lower === 'ps aux' || lower === 'top') {
      appendOut(`<p class="c-mid">PID   COMMAND</p>`);
      appendOut(`<p class="c-mid">1     thinking</p>`);
      appendOut(`<p class="c-mid">2     building</p>`);
      appendOut(`<p class="c-muted">3     this-terminal (you)</p>`);
    }

    else if (lower.startsWith('grep')) {
      appendOut(`<p class="c-muted">grep: pattern found in: everything.</p>`);
    }

    else if (cmd !== '') {
      appendOut(`<p class="c-red">command not found: ${esc(base)}</p>`);
      appendOut(`<p class="c-dim">type <span class="c-bright">help</span> for available commands.</p>`);
    }

    appendBlank();
    scrollBottom();
  }

  // ── Input handling ───────────────────────────────────
  realInput.addEventListener('keydown', e => {
    if (vimMode) {
      if (e.key === 'Enter') {
        const val = typed;
        typed = '';
        updateDisplay();
        runCommand(val);
        realInput.value = '';
      } else if (e.key === 'Backspace') {
        typed = typed.slice(0, -1);
        updateDisplay();
      } else if (e.key.length === 1) {
        typed += e.key;
        updateDisplay();
        e.preventDefault();
      }
      return;
    }

    if (e.key === 'Enter') {
      const val = typed;
      if (val.trim()) {
        history.unshift(val);
        if (history.length > 50) history.pop();
      }
      histIdx = -1;
      typed = '';
      updateDisplay();
      runCommand(val);
      realInput.value = '';
    } else if (e.key === 'Backspace') {
      typed = typed.slice(0, -1);
      updateDisplay();
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (histIdx < history.length - 1) {
        histIdx++;
        typed = history[histIdx];
        updateDisplay();
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx > 0) {
        histIdx--;
        typed = history[histIdx];
      } else {
        histIdx = -1;
        typed = '';
      }
      updateDisplay();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      // Autocomplete
      const completions = ['help','whoami','ls','ls -la','cat about.txt','cat experience.txt','cat contact.txt','cat skills.txt','git log','man samir','neofetch','ping samiringle.com','history','clear','jobs','traceroute samiringle.com'];
      const match = completions.find(c => c.startsWith(typed) && c !== typed);
      if (match) { typed = match; updateDisplay(); }
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      output.innerHTML = '';
    } else if (e.key === 'c' && e.ctrlKey) {
      e.preventDefault();
      appendEcho(typed + '^C');
      appendBlank();
      typed = '';
      updateDisplay();
      scrollBottom();
    } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      typed += e.key;
      updateDisplay();
      e.preventDefault();
    }
  });

  // Sync paste
  realInput.addEventListener('input', () => {
    const val = realInput.value;
    if (val) { typed += val; realInput.value = ''; updateDisplay(); }
  });

  focusInput();
})();
</script>
</body>
</html>
