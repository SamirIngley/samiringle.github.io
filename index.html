<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samir Ingle</title>
  <meta name="description" content="Samir Ingle — Software Engineer based in San Francisco.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f9f9f8;
      --text: #111;
      --muted: #999;
      --faint: #ddd;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 2.5rem;
    }

    /* ── Name ── */
    .name {
      font-size: clamp(2.25rem, 6vw, 3.25rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 0.6rem;
      color: var(--text);
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.75rem;
    }

    /* ── Bio ── */
    .bio {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.8;
      color: #444;
      margin-bottom: 2.75rem;
      max-width: 400px;
    }

    .bio em {
      font-style: normal;
      color: var(--text);
      font-weight: 400;
    }

    /* ── Links ── */
    .links {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 0.775rem;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.18s ease;
      padding: 0.25rem 0;
    }

    .links a:hover {
      color: var(--text);
    }

    .sep {
      width: 1px;
      height: 10px;
      background: var(--faint);
      margin: 0 1.1rem;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: var(--faint);
      letter-spacing: 0.06em;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <main>
    <h1 class="name">Samir Ingle</h1>
    <p class="subtitle">Software Engineer &nbsp;&middot;&nbsp; San Francisco</p>
    <p class="bio">
      Previously an engineer at AWS, where I worked on
      <em>S3's routing infrastructure.</em>
      Now based in San Francisco, exploring what's next.
    </p>
    <nav class="links">
      <a href="https://github.com/SamirIngley" target="_blank" rel="noopener noreferrer">GitHub</a>
      <span class="sep"></span>
      <a href="https://twitter.com/samir_ingle" target="_blank" rel="noopener noreferrer">Twitter</a>
      <span class="sep"></span>
      <a href="https://samiringle.medium.com" target="_blank" rel="noopener noreferrer">Medium</a>
    </nav>
  </main>

  <p class="footer">samiringle.com</p>

  <script>
    (() => {
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');

      let W, H, nodes, packets;

      // ── Resize ──────────────────────────────────────────
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        build();
      }

      // ── Build graph ─────────────────────────────────────
      function build() {
        const density = Math.max(8, Math.floor((W * H) / 28000));
        nodes = Array.from({ length: density }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: 1 + Math.random() * 0.8,
        }));

        packets = [];
        for (let i = 0; i < 18; i++) spawnPacket();
      }

      // ── Spawn a packet traveling between two random nodes ─
      function spawnPacket() {
        if (nodes.length < 2) return;
        let a = Math.floor(Math.random() * nodes.length);
        let b;
        do { b = Math.floor(Math.random() * nodes.length); } while (b === a);

        const speed = 0.0012 + Math.random() * 0.0018;
        packets.push({
          from: nodes[a],
          to: nodes[b],
          t: Math.random(), // stagger starts
          speed,
          size: 1.5 + Math.random(),
        });
      }

      // ── Draw ─────────────────────────────────────────────
      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Edges — only between nearby nodes
        const threshold = Math.min(W, H) * 0.22;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < threshold) {
              const alpha = (1 - d / threshold) * 0.09;
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }

        // Nodes
        for (const n of nodes) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,0,0,0.13)';
          ctx.fill();
        }

        // Packets (animate along edges)
        for (let i = packets.length - 1; i >= 0; i--) {
          const p = packets[i];
          p.t += p.speed;
          if (p.t > 1) {
            packets.splice(i, 1);
            spawnPacket();
            continue;
          }
          // ease in/out
          const e = p.t < 0.5 ? 2 * p.t * p.t : -1 + (4 - 2 * p.t) * p.t;
          const x = p.from.x + (p.to.x - p.from.x) * e;
          const y = p.from.y + (p.to.y - p.from.y) * e;
          const alpha = Math.sin(p.t * Math.PI) * 0.55;

          ctx.beginPath();
          ctx.arc(x, y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,0,0,${alpha})`;
          ctx.fill();
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      draw();
    })();
  </script>
</body>
</html>
